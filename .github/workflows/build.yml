name: Reusable Build

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        default: '25'
        type: string
      maven-args:
        description: 'Arguments passed to ./mvnw'
        default: '--batch-mode verify'
        type: string
      triggered-manually:
        description: 'Set to true when the calling workflow was triggered via workflow_dispatch'
        default: false
        type: boolean

jobs:
  check-membership:
    if: inputs.triggered-manually == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            let isMember = false;
            try {
              const res = await github.rest.orgs.checkMembershipForUser({
                org: 'jme-admin-ch',
                username: actor,
              });
              isMember = res.status === 204;
            } catch (_) {}
            if (!isMember) {
              core.setFailed(`${actor} is not a member of jme-admin-ch`);
            }

  build:
    needs: [check-membership]
    if: always() && (needs.check-membership.result == 'success' || needs.check-membership.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'
      - name: Copy Maven settings for sub-process builds
        run: cp "$HOME/.m2/settings.xml" settings.xml 2>/dev/null || echo '<settings/>' > settings.xml
      - name: Build with Maven
        run: env -u CI ./mvnw ${{ inputs.maven-args }}

  notify-on-failure:
    needs: build
    if: failure()
    uses: jme-admin-ch/.github/.github/workflows/notify-on-failure.yml@main
    permissions:
      contents: write
