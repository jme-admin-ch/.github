name: Notify on Failure

on:
  workflow_call:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace(/^refs\/(?:heads|tags)\//, '');
            await github.rest.repos.createCommitComment({
              owner, repo,
              commit_sha: context.sha,
              body: `❌ Build failed in \`${repo}\` on \`${branch}\`.\n\n` +
                    `**Run:** ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}\n\n` +
                    `CC: @dominique-gueniat-bit @fabien-cerf-bit @laris-jacobs-bit @lorenz-ammon-bit @matthias-fritschi-bit @marko-nalis-bit @mike-rothenbuehler-bit`,
            });
